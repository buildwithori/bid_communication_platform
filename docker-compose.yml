services:
  web:
    image: bid-hub-web-dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    command: sh scripts/docker-dev-entrypoint.sh npm --workspace @bid/web run dev -- --hostname 0.0.0.0 --port 3000
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_next:/workspace/apps/web/.next
    depends_on:
      api:
        condition: service_healthy

  worker:
    image: bid-hub-api-dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: sh scripts/docker-dev-entrypoint.sh npm --workspace @bid/api run start:worker:dev:docker
    env_file:
      - .env.local
    environment:
      DOCKER_PRISMA_SETUP: "true"
      DOCKER_APPLY_MIGRATIONS: "true"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*nest.*worker' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 90s
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - worker_build:/workspace/apps/api/.worker-docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  email-preview:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: npm run email:dev
    env_file:
      - .env.local
    environment:
      DOCKER_PRISMA_SETUP: "true"
      DOCKER_APPLY_MIGRATIONS: "true"
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3001', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - email_preview_next:/workspace/apps/api/.react-email
    depends_on:
      api:
        condition: service_healthy

  api:
    image: bid-hub-api-dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: sh scripts/docker-dev-entrypoint.sh npm --workspace @bid/api run start:dev:docker
    env_file:
      - .env.local
    ports:
      - "4000:4000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - api_build:/workspace/apps/api/.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    env_file:
      - .env.local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    entrypoint: /bin/sh
    env_file:
      - .env.local
    command:
      - -c
      - >-
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing local/"$$DO_SPACES_BUCKET" &&
        mc anonymous set none local/"$$DO_SPACES_BUCKET"
    depends_on:
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.local
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"
      - "8025:8025"

  pgadmin:
    image: dpage/pgadmin4:8
    env_file:
      - .env.local
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  root_node_modules:
  web_next:
  api_build:
  worker_build:
  email_preview_next:
  postgres_data:
  redis_data:
  pgadmin_data:
  minio_data:
