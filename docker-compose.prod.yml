x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2.10-alpine
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-bid-hub-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    init: true
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3000/health'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ${API_IMAGE:-bid-hub-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    init: true
    expose:
      - "4000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:4000/api/health'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    image: ${API_IMAGE:-bid-hub-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    command: npm run prisma:migrate:deploy
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    restart: "no"
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ${API_IMAGE:-bid-hub-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    command: npm run start:worker
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*dist/worker.js' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
